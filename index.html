<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 동선 맵</title>
    
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=657bdfe7ee1d704bef9b218d24fccc4f"></script>
    
    <style>
        /* 2. 지도가 들어갈 박스의 크기를 지정합니다 */
        #map {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>나의 동선 맵 만들기</h1>
    <div id="map"></div>

    <script>
        // 3. 지도를 띄울 HTML 엘리먼트를 가져옵니다.
        var container = document.getElementById('map'); 
        
        // 4. 지도의 초기 중심 좌표(위도, 경도)와 확대 레벨을 설정합니다.
        // 현재 좌표는 서울역 기준입니다. 원하는 중심지로 바꾸셔도 됩니다!
        var options = {
            center: new kakao.maps.LatLng(37.555142, 126.970447), 
            level: 3 
        };

        // 5. 지도를 생성합니다.
        var map = new kakao.maps.Map(container, options);
    </script>
    
</body>
</html>
