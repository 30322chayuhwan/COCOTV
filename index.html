<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 지하철 동선 맵</title>
    
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=657bdfe7ee1d704bef9b218d24fccc4f"></script>
    
    <style>
        #map {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
        }
        /* 말풍선(인포윈도우) 스타일 예쁘게 다듬기 */
        .info-box {
            padding: 10px;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        .info-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .subway-tag {
            display: inline-block;
            background-color: #3d550c; /* 기본 초록색 (2호선 느낌) */
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>나의 지하철 동선 맵</h1>
    <p>💡 마커(핀)를 클릭하면 이동할 지하철 노선 정보가 나옵니다.</p>
    <div id="map"></div>

    <script>
        var container = document.getElementById('map'); 
        
        // 지도 중심을 '홍대입구역' 근처로 잡았습니다.
        var options = {
            center: new kakao.maps.LatLng(37.5565, 126.9245), 
            level: 6 
        };
        var map = new kakao.maps.Map(container, options);

        // 1. 내 동선 장소 데이터 리스트 (이름, 좌표, 탈 지하철 정보)
        var places = [
            {
                title: "1. 홍대입구역 (출발)",
                latlng: new kakao.maps.LatLng(37.5565, 126.9245),
                subway: "지하철 2호선 탑승"
            },
            {
                title: "2. 신촌역 (경유지)",
                latlng: new kakao.maps.LatLng(37.5552, 126.9369),
                subway: "이어서 2호선 유지"
            },
            {
                title: "3. 이대역 (도착)",
                latlng: new kakao.maps.LatLng(37.5567, 126.9460),
                subway: "2호선 이대역 하차"
            }
        ];

        // 선을 그리기 위한 좌표 배열
        var linePath = [];

        // 2. 반복문을 돌며 마커와 말풍선 생성하기
        places.forEach(function(place) {
            // 선 경로에 좌표 추가
            linePath.push(place.latlng);

            // 마커 생성
            var marker = new kakao.maps.Map2 = new kakao.maps.Marker({
                map: map,
                position: place.latlng
            });

            // 마커를 클릭했을 때 보여줄 말풍선 내용 (HTML)
            var content = `
                <div class="info-box">
                    <div class="info-title">${place.title}</div>
                    <span class="subway-tag">${place.subway}</span>
                </div>
            `;

            // 인포윈도우(말풍선) 생성
            var infowindow = new kakao.maps.InfoWindow({
                content: content,
                removable: true // 닫기 버튼(X) 활성화
            });

            // 마커 클릭 이벤트 등록: 클릭하면 말풍선이 열림
            kakao.maps.event.addListener(marker, 'click', function() {
                infowindow.open(map, marker);
            });
        });

        // 3. 장소와 장소 사이를 잇는 동선(선) 그리기
        var polyline = new kakao.maps.Polyline({
            path: linePath, // 선을 구성하는 좌표 배열
            strokeWeight: 5, // 선의 두께
            strokeColor: '#FF0000', // 선의 색깔 (빨간색)
            strokeOpacity: 0.7, // 선의 투명도
            strokeStyle: 'solid' // 선의 스타일
        });

        // 지도에 선 띄우기
        polyline.setMap(map);
    </script>
    
</body>
</html>
